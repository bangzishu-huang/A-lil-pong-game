name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to 'master' if your branch is named master

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python and Pygbag
        run: |
          python -m pip install --upgrade pip
          pip install pygbag

      - name: Build Web Version
        run: |
          python -m pygbag --build code 

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web      
          branch: gh-pages
